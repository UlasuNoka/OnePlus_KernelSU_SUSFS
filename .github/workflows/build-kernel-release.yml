name: Build and Release OnePlus Kernels

permissions:
  contents: write
  actions: write

on:
  workflow_dispatch:
    inputs:
      make_release:
        description: 'Do you want to create a release?'
        required: true
        type: boolean
        default: false
      op_model:
        description: 'Select the OnePlus kernels to build'
        required: true
        type: choice
        options:
          - OOS14+15+16
          - OOS15+16
          - OOS14+15
          - OOS16
          - OOS15
          - OOS14
          - android16-6.12
          - android15-6.6
          - android14-6.1
          - android13-5.15
          - android12-5.10
        default: OOS16
      optimize_level:
        description: "Compiler optimization level"
        required: true
        type: choice
        options: [O2, O3]
        default: O2
      clean_build:
        description: 'Clean build (no ccache)'
        type: boolean
        default: false
      debug:
        description: 'Enable debug mode'
        required: false
        type: boolean
        default: false
      mirror_toolchains:
        description: 'Do you want to sync toolchains before build? [99% runs not required]'
        required: false
        type: boolean
        default: false
      build_timestamp:
        description: 'Custom kernel build timestamp for uname -a (e.g. "Tue Feb 10 10:01:02 UTC 2026"). Leave empty for current time.'
        type: string
        default: ''
      kernel_localversion:
        description: 'Kernel localversion suffix (e.g. -custom). Appended after git hash.'
        required: false
        type: string
        default: ''
      zram_compression:
        description: 'Default ZRAM compression algorithm (none keeps the defconfig default)'
        required: false
        type: choice
        options: [none, lz4, zstd, lzo, lzo-rle]
        default: 'none'

jobs:
  set-op-model:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
      device_count: ${{ steps.set-matrix.outputs.count }}
    env:
      GH_TOKEN: ${{ github.token }}
      GH_HTTP_TIMEOUT: 600
    steps:
      - name: 📥 Checkout Code (to access configs/)
        uses: actions/checkout@v6
        with:
          sparse-checkout: |
            configs/
          sparse-checkout-cone-mode: false

      - name: 🔍 Generate build matrix
        id: set-matrix
        shell: bash
        run: |
          set -euo pipefail
          echo "::group::Matrix generation"

          input="${{ github.event.inputs.op_model }}"

          echo "[" > matrix.json
          mapfile -t all_json_files < <(find configs/ -name "*.json" -print0 | xargs -0 -n1)
          for i in "${!all_json_files[@]}"; do
            file="${all_json_files[$i]}"
            if [ -f "$file" ]; then
              jq -r '.' "$file" >> matrix.json
              if [ $((i+1)) -lt ${#all_json_files[@]} ]; then
                echo "," >> matrix.json
              fi
            fi
          done
          echo "]" >> matrix.json

          jq_filter="."

          case "$input" in
            OOS14+15+16)
              ;;
            OOS15+16)
              jq_filter="map(select(.os_version == \"OOS15\" or .os_version == \"OOS16\"))"
              ;;
            OOS14+15)
              jq_filter="map(select(.os_version == \"OOS14\" or .os_version == \"OOS15\"))"
              ;;
            OOS16)
              jq_filter="map(select(.os_version == \"OOS16\"))"
              ;;
            OOS15)
              jq_filter="map(select(.os_version == \"OOS15\"))"
              ;;
            OOS14)
              jq_filter="map(select(.os_version == \"OOS14\"))"
              ;;
            android*-*.*)
              IFS='-' read -r av kv <<< "$input"
              jq_filter="map(select(.os_version == \"OOS15\" or .os_version == \"OOS16\")) | map(select(.android_version == \"$av\" and .kernel_version == \"$kv\"))"
              echo "ℹ️  Android-Kernel filter applied: $av-$kv"
              ;;
            *)
              echo "::warning::Unknown input '$input'. Using empty filter."
              jq_filter="map(select(false))"
              ;;
          esac

          filtered=$(jq -c "$jq_filter" matrix.json)
          count=$(jq 'length' <<<"$filtered")

          filtered=$(echo "$filtered" | jq '
            sort_by(
              (.os_version | gsub("OOS"; "") | tonumber) * -1,
              .model
            )
          ')

          if [ "$count" -eq 0 ]; then
            echo "::error::No config files found for input '$input' after applying filters!"
            echo ""
            echo "Available configurations:"
            jq -r '.[] | "  - \(.model) (\(.os_version), \(.android_version)-\(.kernel_version))"' matrix.json
            exit 1
          fi

          echo "$filtered" | jq '.' > matrix.json

          # Build the kernel without injecting any root framework
          merged_matrix=$(jq -n --argjson devices "$filtered" '[ $devices[] ]')

          final_count=$(echo "$merged_matrix" | jq 'length')
          echo "✅ Found $final_count device(s) to build"
          echo ""
          echo "Selected devices:"
          jq -r '.[] | "  - \(.model) (\(.os_version), \(.android_version)-\(.kernel_version))"' <<<"$merged_matrix"

          echo "count=$count" >> "$GITHUB_OUTPUT"

          merged_matrix=$(echo "$merged_matrix" | jq '
            sort_by(
              (.os_version | gsub("OOS"; "") | tonumber? // 0) * -1,
              .model
            )
          ')

          wrapped=$(jq -n --argjson items "$merged_matrix" '{ include: $items }')
          echo "matrix=$(jq -c . <<< "$wrapped")" >> "$GITHUB_OUTPUT"

          echo "::endgroup::"

      - name: Upload build matrix
        uses: actions/upload-artifact@v7
        with:
          name: build-matrix
          path: matrix.json
          archive: false
          retention-days: 7

      - name: 📊 Build plan summary
        run: |
          build_ts_input="${{ inputs.build_timestamp }}"
          if [ -z "$build_ts_input" ]; then
            build_ts_display="⏱️ auto (current build time)"
          else
            build_ts_display="📌 \`$build_ts_input\`"
          fi

          {
            cat << 'EOF'
          ## 🎯 Build Plan

          **Target:** ${{ inputs.op_model }}
          **Devices:** ${{ steps.set-matrix.outputs.count }}
          **Build mode:** kernel-only build

          **Configuration:**
          EOF
            echo "- Build Timestamp: $build_ts_display"
            cat << 'EOF'
          - Optimization: ${{ inputs.optimize_level }}
          - Clean Build/No Ccache: ${{ inputs.clean_build && '✅ Yes' || '❌ No' }}
          - Create Release: ${{ inputs.make_release && '✅ Yes' || '❌ No' }}
          - Create Debug Artifacts: ${{ inputs.debug && '✅ Yes' || '❌ No' }}
          EOF
          } >> "$GITHUB_STEP_SUMMARY"

  mirror_toolchain:
    needs: set-op-model
    if: ${{ inputs.mirror_toolchains }}
    uses: ./.github/workflows/mirror-toolchains.yml
    secrets: inherit

  prepare_ccache:
    name: Prepare ccache binary (download once)
    runs-on: ubuntu-latest
    steps:
      - name: Download custom ccache once
        run: |
          set -uo pipefail
          echo "::group::Download ccache"
          url="https://raw.githubusercontent.com/WildKernels/kernel_patches/refs/heads/main/ccache/ccache-x86-64"
          ok=0
          for attempt in 1 2 3 4 5 6; do
            if curl -LfsS --connect-timeout 30 --max-time 120 -H "User-Agent: Mozilla/5.0" "$url" -o ccache && [ -s ccache ]; then
              ok=1; break
            fi
            echo "attempt $attempt failed (GitHub raw 504/throttle); backing off..."
            sleep $(( attempt * 5 + RANDOM % 6 ))
          done
          if [ "$ok" = 1 ]; then
            echo "✅ downloaded ccache once for all matrix jobs"
          else
            echo "::warning::custom ccache download failed; matrix jobs will fall back to the apt ccache"
            rm -f ccache
          fi
          echo "::endgroup::"
      - name: Upload ccache artifact
        uses: actions/upload-artifact@v7
        with:
          name: ccache-binary
          path: ccache
          retention-days: 1
          if-no-files-found: warn

  build:
    name: build (${{ matrix.model }}, ${{ matrix.soc }}, ${{ matrix.branch }}, ${{ matrix.manifest }}, ${{ matrix.android_version }}, ${{ matrix.kernel_version }}, ${{ matrix.os_version }})
    needs: [set-op-model, mirror_toolchain, prepare_ccache]
    if: |
      !cancelled() &&
      needs.set-op-model.result == 'success' &&
      (needs.mirror_toolchain.result == 'success' || needs.mirror_toolchain.result == 'skipped')
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.set-op-model.outputs.matrix) }}
    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: 🧹 Emergency Disk Cleanup
        if: ${{ matrix.disk_cleanup }}
        uses: ./.github/actions/disk-cleanup

      - name: Install Minimal Dependencies
        run: |
          set -euo pipefail
          echo "::group::Install dependencies"
          sudo apt-get -o Acquire::Retries=3 update -qq
          sudo DEBIAN_FRONTEND=noninteractive apt-get install -y --no-install-recommends \
            git curl ca-certificates build-essential clang lld flex bison \
            libelf-dev libssl-dev libncurses-dev zlib1g-dev liblz4-tool \
            libxml2-utils rsync unzip dwarves file python3 ccache jq bc dos2unix kmod libdw-dev elfutils pigz
          sudo apt-get clean
          echo "✅ Dependencies installed"
          echo "::endgroup::"

      - name: Get prebuilt ccache (downloaded once by prepare_ccache)
        uses: actions/download-artifact@v8
        with:
          name: ccache-binary
          path: ccache-dl
        continue-on-error: true

      - name: Install ccache (ECS by cctv18, shared via artifact)
        run: |
          set -uo pipefail
          echo "::group::Install ccache"
          if [ -s ccache-dl/ccache ]; then
            sudo cp -f ccache-dl/ccache /usr/bin/ccache
            sudo chmod +x /usr/bin/ccache
            echo "✅ installed custom ccache from shared artifact"
          else
            echo "::warning::shared ccache artifact unavailable; using apt ccache"
          fi
          rm -rf ccache-dl
          echo "[DEBUG] Ccache version : $(ccache --version | head -1)"
          echo "::endgroup::"

      - name: ♻️ Configure ccache & LTO cache (bounded)
        run: |
          echo "::group::Configure ccache environment"
          set -euo pipefail
          if command -v ccache >/dev/null 2>&1; then
            CACHE_DIR="${{ github.workspace }}/.ccache"
            LDCACHE_DIR="${{ github.workspace }}/.ld_cache"
            CCACHE_LOG="${{ github.workspace }}/ccache.log"
            mkdir -p "$CACHE_DIR"
            mkdir -p "$LDCACHE_DIR"

            SETTINGS=(
              "CCACHE_DIR=$CACHE_DIR"
              "LDCACHE_DIR=$LDCACHE_DIR"
              "CCACHE_MAXSIZE=12G"
              "CCACHE_COMPILERCHECK=content"
              "CCACHE_BASEDIR=${GITHUB_WORKSPACE}"
              "CCACHE_NOHASHDIR=true"
              "CCACHE_IGNOREOPTIONS=--sysroot*"
              "CCACHE_COMPRESSION=true"
              "CCACHE_COMPRESSION_LEVEL=3"
              "CCACHE_DIRECT=true"
              "CCACHE_FILE_CLONE=true"
              "CCACHE_INODE_CACHE=true"
              "CCACHE_IS_KERNEL_COMPILING=true"
              "CCACHE_UMASK=002"
              "CCACHE_SLOPPINESS=file_macro,time_macros,include_file_mtime,include_file_ctime,pch_defines,system_headers,locale"
            )

            for setting in "${SETTINGS[@]}"; do
              export "$setting"
              echo "$setting" >> "$GITHUB_ENV"
            done

            if [ "${{ inputs.debug }}" == "true" ]; then
              export "CCACHE_LOGFILE=$CCACHE_LOG"
              echo "CCACHE_LOGFILE=$CCACHE_LOG" >> "$GITHUB_ENV"
            fi

            if ccache --help 2>&1 | grep -q 'depend_mode'; then
              export CCACHE_DEPEND=true
              echo "CCACHE_DEPEND=true" >> "$GITHUB_ENV"
            fi

            echo "✅ ccache configured successfully"
            ccache -p
          else
            echo "ccache not found, skipping configuration."
          fi
          echo "::endgroup::"

      - name: 🧹 Prepare op_config_json
        id: prepare_config
        shell: bash
        run: |
          echo "config_json=$(jq -nc --argjson m '${{ toJSON(matrix) }}' '$m')" >> "$GITHUB_OUTPUT"

      - name: 🔨 Build Kernel
        id: build
        uses: ./.github/actions/build-kernel
        with:
          op_config_json: ${{ steps.prepare_config.outputs.config_json }}
          optimize_level: ${{ inputs.optimize_level }}
          build_timestamp: ${{ inputs.build_timestamp }}
          clean: ${{ inputs.clean_build }}
          debug: ${{ inputs.debug }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          kernel_localversion: ${{ inputs.kernel_localversion }}
          zram_compression: ${{ inputs.zram_compression }}

      - name: 📊 Build statistics
        id: build-stat
        if: always()
        run: |
          echo "::group::Build Statistics"
          echo "Device: ${{ matrix.model }}"
          echo "OS Version: ${{ matrix.os_version }}"
          echo "Kernel: ${{ matrix.android_version }}-${{ matrix.kernel_version }}"
          echo "Build mode: kernel-only"
          echo "Status: ${{ job.status }}"

          if [ "${{ steps.build.outcome }}" = "success" ]; then
            echo ""
            echo "✅ Build completed successfully"
            echo ""
            echo "Outputs:"
            echo "  - Kernel: ${{ steps.build.outputs.kernel_version }}"
            echo "  - Build time: ${{ steps.build.outputs.build_time }}s"
            if [ "${{ inputs.clean_build }}" != "true" ]; then
              echo "  - ccache hit rate: ${{ steps.build.outputs.ccache_hit_rate }}"
              echo "  - ccache direct rate: ${{ steps.build.outputs.ccache_direct_rate }}"
            fi
          else
            echo "❌ Build failed"
          fi
          echo "::endgroup::"

      - name: 📝 Job summary
        if: always()
        run: |
          cat >> $GITHUB_STEP_SUMMARY << EOF

          ### ${{ matrix.model }} (${{ matrix.os_version }}) - ${{ job.status == 'success' && '✅ Success' || '❌ Failed' }}

          **Kernel:** ${{ matrix.android_version }}-${{ matrix.kernel_version }}
          **Build mode:** kernel-only build
          EOF

          if [ "${{ steps.build.outcome }}" = "success" ]; then
            cat >> $GITHUB_STEP_SUMMARY << EOF
          | Metric | Value |
          |--------|-------|
          | **Kernel** | ${{ steps.build.outputs.kernel_version }} |
          | **Build Time** | ${{ steps.build.outputs.build_time }}s |
          EOF
            if [ "${{ inputs.clean_build }}" != "true" ]; then
              cat >> $GITHUB_STEP_SUMMARY << EOF
          | **ccache Hit Rate** | ${{ steps.build.outputs.ccache_hit_rate }} |
          | **ccache Direct Rate** | ${{ steps.build.outputs.ccache_direct_rate }} |
          EOF
            fi
            cat >> $GITHUB_STEP_SUMMARY << EOF

          **Image SHA256:** \`${{ steps.build.outputs.image_sha256 }}\`
          **AnyKernel3 Zip SHA256:** \`${{ steps.build.outputs.zip_sha256 }}\`
          EOF
          fi

      - name: 🧹 Final cleanup and space report
        if: always()
        run: |
          echo "::group::Cleanup"
          sudo rm -rf "$GITHUB_WORKSPACE/out" || true
          sudo rm -rf "$GITHUB_WORKSPACE/build" || true
          sudo rm -rf "$GITHUB_WORKSPACE/kernel/out" || true
          sudo rm -rf "$GITHUB_WORKSPACE/.repo" || true
          sudo rm -rf /tmp/* || true

          if command -v ccache >/dev/null 2>&1; then
            echo ""
            echo "📊 ccache statistics after build:"
            ccache -s
            echo ""
            echo "💾 ccache preserved for next build"
          fi

          echo ""
          echo "💽 Final disk usage:"
          df -h /
          echo "::endgroup::"

  trigger-release:
    needs: [set-op-model, build]
    runs-on: ubuntu-latest
    if: |
      !cancelled() &&
      inputs.make_release == true &&
      needs.build.result == 'success' &&
      needs.set-op-model.result == 'success'
    env:
      REPO_OWNER: ${{ github.repository_owner }}
      REPO_NAME: ${{ github.event.repository.name }}
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      RELEASE_NAME: 'OnePlus Kernels — ${{ github.run_id }}'
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: 🏷️ Generate and Create New Tag
        run: |
          BUILD_DATE=$(date -u '+%Y%m%d-%H%M')
          NEW_TAG="kernel-${BUILD_DATE}"
          echo "New tag: $NEW_TAG"
          echo "NEW_TAG=${NEW_TAG}" >> $GITHUB_ENV
          git tag $NEW_TAG
          git push origin $NEW_TAG

      - name: 📥 Download Artifacts
        uses: actions/download-artifact@v8
        with:
          path: ./downloaded-artifacts
          merge-multiple: true
          skip-decompress: true

      - name: 📝 Generate Release Notes
        run: |
          cat << EOF > release_notes.md
          # 🎯 OnePlus Kernels

          > **Build Date:** $(date -u '+%Y-%m-%d %H:%M:%S UTC')
          > **Build ID:** \`${{ github.run_id }}\`
          > **Workflow:** [\`${{ github.workflow }}\`](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})

          ---

          ## 📦 Built Kernels

          Flash the AnyKernel3 ZIP to install the kernel.

          ---

          ## ✨ Features

          - 🐦 HMBIRD SCX Scheduler
          - 🚀 BBR TCP Congestion Control
          - 🛡️ Baseband Guard (BBG)
          - 🌐 TTL Target Support
          - 🧱 IP_SET & IPv6 NAT
          - 🔧 Unicode Fix
          - 💻 Droidspaces (Linux containers)
          - 🔃 NTSync

          > This build contains the kernel only; no root framework is included.

          ---

          ## 📥 Installation

          1. Download the AnyKernel3 ZIP for your device.
          2. Flash via Kernel Flasher.
          3. Reboot.

          EOF

      - name: 🚀 Create GitHub Release
        run: |
          gh release create "$NEW_TAG" \
            --repo "${{ env.REPO_OWNER }}/${{ env.REPO_NAME }}" \
            --title "${{ env.RELEASE_NAME }}" \
            --notes-file release_notes.md \
            --draft

      - name: 📤 Upload Release Assets
        run: |
          for file in ./downloaded-artifacts/*.zip; do
            if [ -f "$file" ]; then
              echo "Uploading $file..."
              gh release upload "$NEW_TAG" "$file" --clobber
            fi
          done